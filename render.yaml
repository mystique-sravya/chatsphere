services:
  # Backend API + WebSocket server
  - type: web
    name: chatsphere-api
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: TABLE_PREFIX
        value: chatsphere
      - key: DEFAULT_AVATAR_STYLE
        value: lorelei-neutral
      - key: DB_SSL_MODE
        value: require
      - key: NODE_ENV
        value: production

  # Frontend static site
  - type: web
    name: chatsphere-web
    runtime: static
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
